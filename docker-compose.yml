services:
  postgres:
    image: postgres:16-alpine
    container_name: still-postgres
    environment:
      POSTGRES_USER: still
      POSTGRES_PASSWORD: still
      POSTGRES_DB: still
    ports:
      - '5432:5432'
    volumes:
      - still_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U still -d still']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: still-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - still_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    container_name: still-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc config host add minio http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio' && sleep 1; done;
      /usr/bin/mc mb minio/still-uploads || true;
      /usr/bin/mc anonymous set public minio/still-uploads || true;
      exit 0;
      "

volumes:
  still_postgres_data:
  still_minio_data:

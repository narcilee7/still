app = 'still-backend'
primary_region = 'iad'

[build]
  dockerfile = './apps/backend/Dockerfile'

[env]
  APP_ENV = 'prod'
  PORT = '8080'
  S3_REGION = 'us-east-1'
  S3_BUCKET = 'still-uploads'
  OTEL_SERVICE_NAME = 'still-backend'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

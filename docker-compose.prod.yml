services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: still-backend
    ports:
      - '8080:8080'
    environment:
      APP_ENV: prod
      PORT: 8080
      DATABASE_URL: postgres://still:still@postgres:5432/still?sslmode=disable
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: still-uploads
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      CORS_ALLOWED_ORIGINS: '*'
      # Required: OPENAI_API_KEY, CLERK_SECRET_KEY
      # Optional: SENTRY_DSN, OTEL_EXPORTER_OTLP_ENDPOINT
    env_file:
      - apps/backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    container_name: still-postgres
    environment:
      POSTGRES_USER: still
      POSTGRES_PASSWORD: still
      POSTGRES_DB: still
    ports:
      - '5432:5432'
    volumes:
      - still_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U still -d still']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: still-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - still_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    container_name: still-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc config host add minio http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio' && sleep 1; done;
      /usr/bin/mc mb minio/still-uploads || true;
      /usr/bin/mc anonymous set public minio/still-uploads || true;
      exit 0;
      "

volumes:
  still_postgres_data:
  still_minio_data:

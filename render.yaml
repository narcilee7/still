services:
  - type: web
    name: still-backend
    runtime: docker
    dockerfilePath: ./apps/backend/Dockerfile
    repo: https://github.com/still-mvp/still
    branch: main
    plan: starter
    envVars:
      - key: APP_ENV
        value: prod
      - key: PORT
        value: '8080'
      - key: S3_REGION
        value: us-east-1
      - key: S3_BUCKET
        value: still-uploads
      - key: OTEL_SERVICE_NAME
        value: still-backend
      - key: DATABASE_URL
        fromDatabase:
          name: still-postgres
          property: connectionString
      # Add via Render dashboard: OPENAI_API_KEY, CLERK_SECRET_KEY, S3_*, SENTRY_DSN

databases:
  - name: still-postgres
    plan: starter
    ipAllowList: []

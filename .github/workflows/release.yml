name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --ignore-engines --frozen-lockfile

      - name: Build landing page
        run: yarn workspace @still/landing build

      - name: Package landing page
        run: |
          cd apps/landing
          zip -r still-landing-dist.zip dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/landing/still-landing-dist.zip
          generate_release_notes: true
          body: |
            Still landing page release.

            Attachments:
            - `still-landing-dist.zip` — static files ready for deployment.

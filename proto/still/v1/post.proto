syntax = "proto3";

package still.v1;

option go_package = "github.com/still-mvp/still/apps/backend/gen/still/v1;stillv1";

import "still/v1/common.proto";

service PostService {
  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);
  rpc GetPost(GetPostRequest) returns (GetPostResponse);
}

message CreatePostRequest {
  string image_url = 1;
  string mood = 2;
  string title = 3;
  string description = 4;
}

message CreatePostResponse {
  Post post = 1;
}

message GetPostRequest {
  string id = 1;
}

message GetPostResponse {
  Post post = 1;
}
